{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Forgot Password</h3>
                <p class="text-muted text-center">Enter your registered email to receive a reset code.</p>
                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Registered Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Code</button>
                </form>
                <hr>
                <p class="text-center mb-0"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
