{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Reset Password</h3>
                <p class="text-muted text-center">Enter the code sent to your email and choose a new password.</p>
                <form method="POST" action="{{ url_for('auth.reset_password') }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" value="{{ email }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label">Verification Code</label>
                        <input type="text" class="form-control" id="code" name="code" maxlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Change Password</button>
                </form>
                <hr>
                <p class="text-center mb-0"><a href="{{ url_for('auth.forgot_password', email=email) }}">Send a new code</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
