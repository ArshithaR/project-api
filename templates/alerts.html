{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2>🔔 Alerts</h2>
    </div>
</div>

<div class="row">
    <div class="col">
        <div class="card">
            <div class="card-body">
                <p class="text-muted">You will receive alerts here when:</p>
                <ul>
                    <li>An API goes down (status code != 200)</li>
                    <li>Response time exceeds your configured threshold</li>
                    <li>An API becomes unavailable</li>
                </ul>
                <p class="text-center text-muted mt-4">No active alerts right now 🎉</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
