name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov bandit
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Run tests with coverage
      run: |
        export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
        python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml
    
    - name: Verify app initialization
      run: |
        export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
        python -c "from app import create_app; app = create_app(); print('✓ App initializes successfully')"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    
    - name: Run security scan
      run: |
        bandit -r app/ -ll --exit-code 0 2>&1 | head -50 || true
      continue-on-error: true

  build-docker:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t api-monitor:latest .
        docker images
    
    - name: Test Docker image
      run: |
        docker run --rm api-monitor:latest python -c "from app import create_app; print('✓ Docker build successful')"

  deploy:
    name: Deploy
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deployment placeholder
      run: |
        echo "✓ Deployment stage (configure based on your infrastructure)"

  notify:
    name: Notify
    needs: [test, build-docker]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Success notification
      run: |
        echo "✅ All CI/CD checks passed!"
        echo "🐳 Docker image ready for deployment"
        echo "📦 Application ready for production"
