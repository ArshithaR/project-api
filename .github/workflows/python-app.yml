name: Python Tests & Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint with flake8
      run: |
        flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  test:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Check Python syntax
      run: |
        python -m py_compile app.py
        python -m py_compile app/__init__.py
        python -m py_compile app/models.py
        python -m py_compile app/routes.py
        python -m py_compile app/monitor.py

    - name: Run unit tests
      run: |
        export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
        python -m pytest tests/test_app.py -v --tb=short
      
    - name: Run Selenium smoke tests (if available)
      run: |
        export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
        python -m pytest tests/test_selenium.py -v --tb=short || true
      continue-on-error: true

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t api-monitor:latest .
        echo "✓ Docker image built successfully"

    - name: Validate Docker image
      run: |
        docker run --rm api-monitor:latest python -c "from app import create_app; print('✓ Docker image validated')"
